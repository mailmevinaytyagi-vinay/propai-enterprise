<!DOCTYPE html>
<html>
<head>
  <title>PropAI Builder Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to right, #eef2ff, #f8fafc);
      color: #111827;
    }

    .header {
      background: #1e3a8a;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 15px;
    }

    .stat-box {
      background: linear-gradient(to bottom right, #ffffff, #f3f4f6);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .lead {
      border-bottom: 1px solid #ddd;
      padding: 10px;
    }

    .lead-matches {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .lead-match {
      border-left: 3px solid #2563eb;
      background: #f8fafc;
      padding: 8px 10px;
      line-height: 1.45;
    }

    .lead-match-score {
      color: #047857;
      font-weight: bold;
    }

    .lead-intelligence {
      margin-top: 10px;
      border-left: 3px solid #047857;
      background: #eef2ff;
      padding: 8px 10px;
      line-height: 1.45;
    }

    .lead-call {
      margin-top: 10px;
      border-left: 3px solid #7c3aed;
      background: #f5f3ff;
      padding: 8px 10px;
      line-height: 1.45;
    }

    .call-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      margin: 8px 0;
    }

    .call-field {
      background: white;
      border: 1px solid #ddd6fe;
      border-radius: 6px;
      padding: 6px 8px;
    }

    .call-transcript {
      margin-top: 8px;
      max-height: 220px;
      overflow: auto;
      background: white;
      border: 1px solid #ddd6fe;
      border-radius: 6px;
      padding: 8px;
    }

    .validation-errors {
      margin-top: 8px;
      color: #991b1b;
    }

    .call-attempts {
      margin-top: 8px;
      background: white;
      border: 1px solid #ddd6fe;
      border-radius: 6px;
      padding: 8px;
    }

    .lead-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .retry-call-button {
      padding: 8px 12px;
      border: 0;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .retry-call-button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .retry-limit-message {
      color: #6b7280;
      font-size: 13px;
    }

    .lead-status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }

    .lead-status-pending {
      background: #f97316;
    }

    .lead-status-hot {
      background: #16a34a;
    }

    .lead-status-warm {
      background: #2563eb;
    }

    .lead-status-cold {
      background: #dc2626;
    }

    .whatsapp-followup-button {
      padding: 8px 12px;
      border: 0;
      border-radius: 6px;
      background: #047857;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .whatsapp-followup-button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .whatsapp-status {
      margin-top: 8px;
      background: white;
      border: 1px solid #ddd6fe;
      border-radius: 6px;
      padding: 8px;
    }

    .dashboard-message {
      margin: 0 0 12px 0;
      padding: 10px 12px;
      border-radius: 6px;
      display: none;
      font-weight: bold;
    }

    .dashboard-message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .dashboard-message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .lead-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .lead-filter {
      display: grid;
      gap: 5px;
      font-size: 13px;
      color: #374151;
    }

    .lead-filter select {
      min-width: 150px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: white;
      color: #111827;
    }

    .export-button {
      padding: 9px 14px;
      border: 0;
      border-radius: 6px;
      background: #1e3a8a;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .empty-leads {
      padding: 12px 0;
      color: #6b7280;
    }

    @media (max-width: 700px) {
      .stats {
        grid-template-columns: repeat(2,1fr);
      }

      .call-fields {
        grid-template-columns: 1fr;
      }

      .lead-filter,
      .lead-filter select,
      .export-button,
      .retry-call-button,
      .whatsapp-followup-button {
        width: 100%;
      }
    }

  </style>
</head>

<body>

<div class="header" id="header">
  <div id="branding">🏠 PropAI Builder Dashboard</div>
  <div id="builderName"></div>
</div>

<div class="container">

  <div class="stats">

    <div class="stat-box">
      Total<br>
      <span id="total">0</span>
    </div>

    <div class="stat-box">
      🔥 HOT<br>
      <span id="hot">0</span>
    </div>

    <div class="stat-box">
      🟡 WARM<br>
      <span id="warm">0</span>
    </div>

    <div class="stat-box">
      ❄️ COLD<br>
      <span id="cold">0</span>
    </div>

  </div>

  <div class="card">
    <canvas id="analyticsChart"></canvas>
  </div>

  <div class="card">
    <h3>Lead History</h3>
    <div class="lead-toolbar">
      <label class="lead-filter">
        Lead status
        <select id="leadStatusFilter">
          <option value="all">All</option>
          <option value="PENDING">PENDING</option>
          <option value="HOT">HOT</option>
          <option value="WARM">WARM</option>
          <option value="COLD">COLD</option>
        </select>
      </label>

      <label class="lead-filter">
        Call status
        <select id="callStatusFilter">
          <option value="all">All</option>
          <option value="completed">completed</option>
          <option value="failed">failed</option>
          <option value="no-answer">no-answer</option>
          <option value="unanswered">unanswered</option>
          <option value="busy">busy</option>
          <option value="cancelled">cancelled</option>
          <option value="canceled">canceled</option>
        </select>
      </label>

      <label class="lead-filter">
        Site visit
        <select id="siteVisitFilter">
          <option value="all">All</option>
          <option value="today">today</option>
          <option value="tomorrow">tomorrow</option>
          <option value="this weekend">this weekend</option>
          <option value="next week">next week</option>
          <option value="later">later</option>
          <option value="unknown">unknown</option>
        </select>
      </label>

      <button class="export-button" id="exportCsvButton" type="button">Export CSV</button>
    </div>
    <div class="dashboard-message" id="dashboardMessage"></div>
    <div id="history"></div>
  </div>

</div>

<script>

const pathParts = window.location.pathname.split("/").filter(Boolean);
const routeBuilder = pathParts[0] === "dashboard" ? pathParts[1] : "";
const params = new URLSearchParams(window.location.search);
const builder = routeBuilder || params.get("builder") || "builder1";

let chart;
let socket;
let allLeads = [];
const maxOutboundCallAttempts = 3;
const retryableCallStatuses = ["failed", "no-answer", "busy", "unanswered", "cancelled", "canceled"];

initializeDashboard();

async function initializeDashboard() {

  await loadBuilderProfile();
  bindLeadControls();
  await loadHistory();
  await loadAnalytics();
  connectDashboardSocket();
}

function bindLeadControls() {

  ["leadStatusFilter", "callStatusFilter", "siteVisitFilter"].forEach((id) => {
    document.getElementById(id).addEventListener("change", renderFilteredLeads);
  });

  document.getElementById("exportCsvButton").addEventListener("click", exportFilteredLeadsCsv);
  document.getElementById("history").addEventListener("click", handleLeadActionClick);
}

async function loadBuilderProfile() {

  const res = await fetch(`/builders/${builder}`);

  if (!res.ok) {
    document.getElementById("history").innerHTML = "Builder dashboard not found";
    return;
  }

  const data = await res.json();

  document.getElementById("branding").innerHTML =
    `${escapeHtml(data.logo)} ${escapeHtml(data.company)}`;

  document.getElementById("builderName").innerHTML =
    escapeHtml(data.username);

  document.getElementById("header").style.background =
    data.themeColor;
}

function connectDashboardSocket() {

  if (socket) {
    socket.disconnect();
  }

  socket = io();

  socket.on("connect", () => {

    socket.emit("builder:join", { builder }, (response) => {

      if (!response || !response.success) {
        console.warn("Dashboard socket join failed");
      }
    });
  });

  socket.on("dashboard:update", (payload) => {

    if (payload.analytics) {
      renderAnalytics(payload.analytics);
    }

    if (payload.lead) {
      prependLead(payload.lead, payload.matches || []);
    }
  });
}

async function loadHistory() {

  const res = await fetch(`/builders/${builder}/leads`);

  const leads = await res.json();

  allLeads = Array.isArray(leads) ? leads : [];
  renderFilteredLeads();
}

function escapeHtml(value) {

  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderLeadMatches(lead, liveMatches) {

  const matches = liveMatches.length
    ? liveMatches
    : (lead.matchedProperties || [])
      .filter((match) => match.property)
      .map((match) => ({
        title: match.property.title,
        location: match.property.location,
        budgetLabel: match.property.budgetLabel,
        bhk: match.property.bhk,
        possession: match.property.possession,
        matchScore: match.matchScore,
        reasons: match.reasons || []
      }));

  if (!matches.length) {
    return "";
  }

  let html = `<div class="lead-matches">`;

  matches.forEach((match) => {

    html += `
      <div class="lead-match">
        <b>${escapeHtml(match.title)}</b>
        <span class="lead-match-score">${escapeHtml(match.matchScore)}%</span><br>
        ${escapeHtml(match.bhk)}BHK · ${escapeHtml(match.location)} · ${escapeHtml(match.budgetLabel)} · ${escapeHtml(match.possession)}<br>
        ${match.reasons.map(escapeHtml).join(" · ")}
      </div>
    `;
  });

  html += `</div>`;

  return html;
}

function renderLeadIntelligence(lead) {

  const intelligence = lead.intelligence;

  if (!intelligence) {
    return "";
  }

  return `
    <div class="lead-intelligence">
      <b>AI Intelligence</b><br>
      Intent: ${escapeHtml(intelligence.intent)}<br>
      Urgency: ${escapeHtml(intelligence.urgency)}<br>
      Budget: ${escapeHtml(intelligence.budgetStrength)}<br>
      Action: ${escapeHtml(intelligence.recommendedAction)}<br>
      Tags: ${(intelligence.tags || []).map(escapeHtml).join(", ")}
    </div>
  `;
}

function plainLeadStatus(status) {

  if (String(status || "").includes("PENDING")) {
    return "PENDING";
  }

  if (String(status || "").includes("HOT")) {
    return "HOT";
  }

  if (String(status || "").includes("WARM")) {
    return "WARM";
  }

  if (String(status || "").includes("COLD")) {
    return "COLD";
  }

  return "PENDING";
}

function displayPendingValue(value) {

  const text = String(value || "").trim();

  return text && !["unknown", "null", "undefined"].includes(text.toLowerCase())
    ? text
    : "Pending";
}

function renderLeadStatusBadge(status) {

  const plainStatus = plainLeadStatus(status);

  return `<span class="lead-status-badge lead-status-${plainStatus.toLowerCase()}">${escapeHtml(plainStatus)}</span>`;
}

function renderLeadScore(lead) {

  const status = getDashboardLeadStatus(lead);

  if (status === "PENDING") {
    return "";
  }

  const score = Number(lead.score || 0);

  return Number.isFinite(score) && score > 0
    ? ` (${escapeHtml(score)}/100)`
    : "";
}

function hasQualifiedDisplayValue(value) {

  return displayPendingValue(value) !== "Pending";
}

function getDashboardLeadStatus(lead) {

  const call = getLeadCall(lead);
  const callStatus = String(call.status || "").toLowerCase();
  const fields = getCallFields(call);
  const values = [
    fields.purpose,
    fields.configuration,
    fields.budget,
    fields.funding,
    fields.siteVisit
  ];
  const validCount = values.filter(hasQualifiedDisplayValue).length;

  if (["no-answer", "busy", "unanswered", "failed", "cancelled", "canceled"].includes(callStatus) || validCount === 0) {
    return "PENDING";
  }

  if (values.every(hasQualifiedDisplayValue)) {
    return "HOT";
  }

  return "WARM";
}

function findAnswerByQuestion(call, question) {

  return (call.answers || []).find((answer) =>
    answer && answer.question === question
  );
}

function answerValue(call, question) {

  const answer = findAnswerByQuestion(call, question);

  if (!answer || answer.valid === false) {
    return "Pending";
  }

  return displayPendingValue(answer.normalizedAnswer || answer.answer);
}

function getCallFields(call) {

  const fields = call.structuredFields || {};

  return {
    purpose: displayPendingValue(fields.purpose || answerValue(call, "Buying Purpose")),
    configuration: displayPendingValue(fields.configuration || answerValue(call, "Configuration")),
    budget: displayPendingValue(fields.budget || answerValue(call, "Approximate Budget")),
    funding: displayPendingValue(fields.funding || answerValue(call, "Budget Readiness")),
    siteVisit: displayPendingValue(fields.siteVisit || answerValue(call, "Site Visit"))
  };
}

function getLeadCall(lead) {

  return lead.outboundCall || {};
}

function getLeadCallStatus(lead) {

  const call = getLeadCall(lead);

  if (call.error || call.status === "failed") {
    return "failed";
  }

  if (call.status === "completed") {
    return "completed";
  }

  return call.status || "unknown";
}

function getLeadSiteVisit(lead) {

  const siteVisit = getCallFields(getLeadCall(lead)).siteVisit;

  return String(siteVisit || "Unknown").trim().toLowerCase();
}

function getNormalizedSiteVisitFilterValue(lead) {

  const siteVisit = getLeadSiteVisit(lead);

  if (!siteVisit || siteVisit === "unknown" || siteVisit === "pending") {
    return "unknown";
  }

  if (siteVisit.includes("today")) {
    return "today";
  }

  if (siteVisit.includes("tomorrow")) {
    return "tomorrow";
  }

  if (siteVisit.includes("weekend") || siteVisit.includes("saturday") || siteVisit.includes("sunday")) {
    return "this weekend";
  }

  if (siteVisit.includes("next week")) {
    return "next week";
  }

  if (siteVisit.includes("later")) {
    return "later";
  }

  return siteVisit;
}

function leadMatchesFilters(lead) {

  const leadStatus = document.getElementById("leadStatusFilter").value;
  const callStatus = document.getElementById("callStatusFilter").value;
  const siteVisit = document.getElementById("siteVisitFilter").value;

  if (leadStatus !== "all" && getDashboardLeadStatus(lead) !== leadStatus) {
    return false;
  }

  if (callStatus !== "all" && getLeadCallStatus(lead) !== callStatus) {
    return false;
  }

  if (siteVisit !== "all" && getNormalizedSiteVisitFilterValue(lead) !== siteVisit) {
    return false;
  }

  return true;
}

function getFilteredLeads() {

  return allLeads.filter(leadMatchesFilters);
}

function renderStructuredFields(lead, call) {

  const fields = getCallFields(call);

  return `
    <div class="call-fields">
      <div class="call-field"><b>Purpose</b><br>${escapeHtml(fields.purpose)}</div>
      <div class="call-field"><b>Configuration</b><br>${escapeHtml(fields.configuration)}</div>
      <div class="call-field"><b>Budget</b><br>${escapeHtml(fields.budget)}</div>
      <div class="call-field"><b>Funding status</b><br>${escapeHtml(fields.funding)}</div>
      <div class="call-field"><b>Site visit plan</b><br>${escapeHtml(fields.siteVisit)}</div>
      <div class="call-field"><b>Lead status</b><br>${escapeHtml(getDashboardLeadStatus(lead))}</div>
    </div>
  `;
}

function renderValidationErrors(call) {

  const storedErrors = call.validationErrors && call.validationErrors.length
    ? call.validationErrors
    : [];
  const answerErrors = (call.answers || [])
      .filter((answer) => answer && answer.valid === false)
      .map((answer) => `${answer.question}: ${answer.answer || "Unknown"}`);
  const transcriptErrors = (call.transcript || [])
      .filter((item) => item && item.question && item.valid === false)
      .map((item) => `${item.question}: ${item.rawAnswer || item.text || "Unknown"}`);
  const errors = [...new Set([
    ...storedErrors,
    ...answerErrors,
    ...transcriptErrors
  ])];

  if (!errors.length) {
    return "";
  }

  return `
    <div class="validation-errors">
      <b>Validation errors</b><br>
      ${errors.map(escapeHtml).join("<br>")}
    </div>
  `;
}

function renderTranscript(call) {

  const transcript = call.transcript || [];

  if (!transcript.length) {
    return "";
  }

  const lines = transcript.map((item) => {
    const details = item.question
      ? ` | Question: ${item.question} | Raw: ${displayPendingValue(item.rawAnswer || item.text)} | Normalized: ${displayPendingValue(item.normalizedAnswer)} | Valid: ${item.valid === true ? "yes" : "no"} | Correction attempts: ${item.retryCount || 0}`
      : "";

    return `${item.speaker || "unknown"}: ${item.text || ""}${details}`;
  });

  return `
    <div class="call-transcript">
      <b>Full transcript</b><br>
      ${lines.map(escapeHtml).join("<br>")}
    </div>
  `;
}

function getCallAttempts(call) {

  const history = Array.isArray(call.attempt_history) ? call.attempt_history : [];
  const attempts = history.length
    ? history.map((item) => ({
      retryAttemptNumber: item.attempt,
      status: item.status,
      retryReason: item.type,
      retryTimestamp: item.timestamp
    }))
    : (Array.isArray(call.callAttempts) ? call.callAttempts : []);

  if (attempts.length) {
    return attempts;
  }

  if (!call.status && !call.callSid) {
    return [];
  }

  return [{
    retryAttemptNumber: 1,
    status: call.status || "unknown",
    callSid: call.callSid,
    retryReason: "Initial outbound call",
    retryTimestamp: call.startedAt
  }];
}

function renderRetryMetadata(call) {

  const retryCount = typeof call.retry_count === "number"
    ? call.retry_count
    : Math.max(0, getCallAttempts(call).length - 1);
  const nextRetry = call.next_retry_time
    ? new Date(call.next_retry_time).toLocaleString()
    : "Pending";

  return `
    Retry count: ${escapeHtml(retryCount)}<br>
    Next retry time: ${escapeHtml(nextRetry)}<br>
  `;
}

function renderAttemptHistory(call) {

  const attempts = getCallAttempts(call);

  if (!attempts.length) {
    return "";
  }

  const rows = attempts
    .map((attempt, index) => {
      const attemptNumber = attempt.retryAttemptNumber || index + 1;
      const status = attempt.status || "unknown";
      const reason = attempt.retryReason ? ` (${escapeHtml(attempt.retryReason)})` : "";

      return `Attempt ${escapeHtml(attemptNumber)} &rarr; ${escapeHtml(status)}${reason}`;
    })
    .join("<br>");

  return `<div class="call-attempts"><b>Attempt history</b><br>${rows}</div>`;
}

function renderRetryCallAction(lead, call) {

  const status = call.status || "";
  const attempts = getCallAttempts(call);

  if (!retryableCallStatuses.includes(status)) {
    return "";
  }

  if (attempts.length >= maxOutboundCallAttempts) {
    return `
      <div class="lead-actions">
        <button class="retry-call-button" type="button" disabled>Retry Call</button>
        <span class="retry-limit-message">Maximum retry limit reached</span>
      </div>
    `;
  }

  const leadId = lead._id || lead.id || "";

  return `
    <div class="lead-actions">
      <button class="retry-call-button" type="button" data-action="retry-call" data-lead-id="${escapeHtml(leadId)}">
        Retry Call
      </button>
    </div>
  `;
}

function renderWhatsAppStatus(lead) {

  const followup = lead.whatsapp_followup || {};
  const sentTime = followup.timestamp
    ? new Date(followup.timestamp).toLocaleString()
    : "Pending";
  const message = followup.message || getWhatsAppPreview(lead);

  return `
    <div class="whatsapp-status">
      <b>WhatsApp Status</b><br>
      Status: ${escapeHtml(followup.status || "Pending")}<br>
      Message Preview: ${escapeHtml(message || "Pending")}<br>
      Last Sent Time: ${escapeHtml(sentTime)}
    </div>
  `;
}

function getWhatsAppPreview(lead) {

  const status = getDashboardLeadStatus(lead);
  const call = getLeadCall(lead);
  const fields = getCallFields(call);
  const name = displayPendingValue(lead.name) === "Pending" ? "there" : lead.name;
  const callStatus = getLeadCallStatus(lead);

  if (status === "COLD") {
    return "Skipped for COLD leads.";
  }

  if (callStatus === "busy" || callStatus === "no-answer" || callStatus === "unanswered") {
    return `Hi ${name}, we tried calling regarding your property enquiry. Please reply with a convenient time.`;
  }

  if (status === "HOT") {
    return `Hi ${name}, thank you for speaking with us. Based on your requirement for ${fields.configuration} in Navi Mumbai with budget ${fields.budget}, our team will share suitable options shortly.`;
  }

  return `Hi ${name}, thank you for your interest. We have noted your requirement and our team will contact you.`;
}

function renderWhatsAppAction(lead) {

  const leadId = lead._id || lead.id || "";

  if (!leadId) {
    return "";
  }

  return `
    <div class="lead-actions">
      <button class="whatsapp-followup-button" type="button" data-action="whatsapp-followup" data-lead-id="${escapeHtml(leadId)}">
        Send WhatsApp Follow-up
      </button>
    </div>
  `;
}

function renderOutboundCall(lead) {

  const call = lead.outboundCall;

  if (!call || !call.status) {
    return "";
  }

  const answers = (call.answers || [])
    .filter((item) => item && item.question)
    .map((item) => {
      const capturedAnswer = displayPendingValue(item.rawAnswer || item.answer);
      const normalizedValue = displayPendingValue(item.normalizedAnswer);
      const normalizedAnswer = normalizedValue !== "Pending" && normalizedValue !== capturedAnswer
        ? ` (${escapeHtml(normalizedValue)})`
        : "";
      const validity = item.valid === false ? " - invalid" : "";
      const retry = typeof item.retryCount === "number" ? ` - correction attempts: ${item.retryCount}` : "";

      return `${escapeHtml(item.question)}<br><b>${escapeHtml(capturedAnswer)}${normalizedAnswer}</b>${escapeHtml(validity)}${escapeHtml(retry)}`;
    })
    .join("<br><br>");

  return `
    <div class="lead-call">
      <b>Outbound AI Call</b><br>
      Latest status: ${escapeHtml(call.status)}<br>
      ${renderRetryMetadata(call)}
      ${renderAttemptHistory(call)}
      ${renderStructuredFields(lead, call)}
      ${call.summary ? `Summary: ${escapeHtml(call.summary)}<br>` : ""}
      ${answers ? `<br>${answers}` : ""}
      ${renderValidationErrors(call)}
      ${renderTranscript(call)}
      ${call.error ? `Error: ${escapeHtml(call.error)}` : ""}
      ${renderWhatsAppStatus(lead)}
      ${renderRetryCallAction(lead, call)}
      ${renderWhatsAppAction(lead)}
    </div>
  `;
}

function renderLead(lead, liveMatches = []) {

  const leadId = lead._id || lead.id || "";
  const matches = liveMatches.length ? liveMatches : (lead._liveMatches || []);

  return `
    <div class="lead" data-lead-id="${escapeHtml(leadId)}">

      <b>${escapeHtml(lead.name)}</b><br>

      📞 ${escapeHtml(lead.phone)}<br>

      📍 ${escapeHtml(lead.location)}<br>

      💰 ${escapeHtml(lead.budget)}<br>

      Lead status: ${renderLeadStatusBadge(getDashboardLeadStatus(lead))}${renderLeadScore(lead)}<br>

      ⏰ ${escapeHtml(lead.timeline)}<br>

      ${renderLeadIntelligence(lead)}

      ${renderOutboundCall(lead)}

      ${renderLeadMatches(lead, matches)}
    </div>
  `;
}

function renderLeads(leads) {

  if (!leads.length) {
    document.getElementById("history").innerHTML =
      `<div class="empty-leads">No leads match selected filters.</div>`;
    return;
  }

  let html = "";

  leads.forEach((lead) => {

    html += renderLead(lead);
  });

  document.getElementById("history").innerHTML = html;
}

function renderFilteredLeads() {

  renderLeads(getFilteredLeads());
}

function prependLead(lead, matches = []) {

  const leadId = lead._id || lead.id || "";
  const nextLead = Object.assign({}, lead, {
    _liveMatches: matches
  });
  const existingIndex = leadId
    ? allLeads.findIndex((item) => (item._id || item.id || "") === leadId)
    : -1;

  if (existingIndex >= 0) {
    allLeads[existingIndex] = nextLead;
  }
  else {
    allLeads.unshift(nextLead);
  }

  renderFilteredLeads();
}

function showDashboardMessage(message, type) {

  const messageEl = document.getElementById("dashboardMessage");

  messageEl.textContent = message || "";
  messageEl.className = message
    ? `dashboard-message ${type || "success"}`
    : "dashboard-message";
}

async function handleLeadActionClick(event) {

  const button = event.target.closest("[data-action]");

  if (!button) {
    return;
  }

  const leadId = button.getAttribute("data-lead-id");

  if (!leadId) {
    return;
  }

  if (button.getAttribute("data-action") === "whatsapp-followup") {
    await sendManualWhatsAppFollowup(button, leadId);
    return;
  }

  button.disabled = true;
  button.textContent = "Retrying...";
  showDashboardMessage("", "");

  try {
    const res = await fetch(`/builders/${builder}/leads/${leadId}/retry-call`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        retryReason: "Manual retry"
      })
    });
    const data = await res.json();

    if (data.lead) {
      prependLead(data.lead, []);
    }

    if (!res.ok || !data.success) {
      throw new Error(data.message || "Retry failed. Please check call configuration.");
    }

    showDashboardMessage("Retry call started.", "success");
  }
  catch (err) {
    const message = err && err.message === "Maximum retry limit reached"
      ? "Maximum retry limit reached"
      : "Retry failed. Please check call configuration.";
    showDashboardMessage(message, "error");
    button.disabled = false;
    button.textContent = "Retry Call";
  }
}

async function sendManualWhatsAppFollowup(button, leadId) {

  button.disabled = true;
  button.textContent = "Sending...";
  showDashboardMessage("", "");

  try {
    const res = await fetch(`/api/leads/${leadId}/whatsapp-followup`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        reason: "manual-dashboard"
      })
    });
    const data = await res.json();

    if (!res.ok || !data.success) {
      throw new Error(data.message || "WhatsApp follow-up failed");
    }

    await loadHistory();
    showDashboardMessage(data.message || "WhatsApp follow-up sent", "success");
  }
  catch (err) {
    showDashboardMessage("WhatsApp follow-up failed", "error");
  }
  finally {
    button.disabled = false;
    button.textContent = "Send WhatsApp Follow-up";
  }
}

function validationErrorsForCsv(call) {

  const storedErrors = call.validationErrors && call.validationErrors.length
    ? call.validationErrors
    : [];
  const answerErrors = (call.answers || [])
    .filter((answer) => answer && answer.valid === false)
    .map((answer) => `${answer.question}: ${answer.answer || "Unknown"}`);
  const transcriptErrors = (call.transcript || [])
    .filter((item) => item && item.question && item.valid === false)
    .map((item) => `${item.question}: ${item.rawAnswer || item.text || "Unknown"}`);

  return [...new Set([
    ...storedErrors,
    ...answerErrors,
    ...transcriptErrors
  ])].join("; ");
}

function csvValue(value) {

  const text = String(value || "");

  return `"${text.replace(/"/g, '""')}"`;
}

function exportFilteredLeadsCsv() {

  const headers = [
    "Customer name",
    "Phone number",
    "Location",
    "Purpose",
    "Configuration",
    "Budget",
    "Funding status",
    "Site visit plan",
    "Lead status",
    "Call status",
    "Summary",
    "Validation errors",
    "Created date/time"
  ];
  const rows = getFilteredLeads().map((lead) => {
    const call = getLeadCall(lead);
    const fields = getCallFields(call);

    return [
      lead.name,
      lead.phone,
      lead.location,
      fields.purpose,
      fields.configuration,
      fields.budget,
      fields.funding,
      fields.siteVisit,
      getDashboardLeadStatus(lead),
      getLeadCallStatus(lead),
      call.summary,
      validationErrorsForCsv(call),
      lead.createdAt ? new Date(lead.createdAt).toLocaleString() : ""
    ];
  });
  const csv = [
    headers.map(csvValue).join(","),
    ...rows.map((row) => row.map(csvValue).join(","))
  ].join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");

  link.href = url;
  link.download = `${builder}-leads.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

async function loadAnalytics() {

  const res = await fetch(`/builders/${builder}/analytics`);

  const data = await res.json();

  renderAnalytics(data);
}

function renderAnalytics(data) {

  document.getElementById("total").innerHTML = data.total;
  document.getElementById("hot").innerHTML = data.hot;
  document.getElementById("warm").innerHTML = data.warm;
  document.getElementById("cold").innerHTML = data.cold;

  const chartData = [data.hot, data.warm, data.cold];

  if (chart) {
    chart.data.datasets[0].data = chartData;
    chart.update();
    return;
  }

  const ctx = document.getElementById("analyticsChart");

  chart = new Chart(ctx, {

    type: "bar",

    data: {
      labels: ["HOT", "WARM", "COLD"],
      datasets: [{
        label: "Lead Analytics",
        data: chartData
      }]
    }
  });
}
