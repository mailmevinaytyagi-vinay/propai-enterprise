<!DOCTYPE html>
<html>
<head>
  <title>PropAI Enterprise</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to right, #eef2ff, #f8fafc);
      color: #111827;
    }

    .header {
      background: #1e3a8a;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      background: #2563eb;
      font-weight: bold;
      font-size: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .hidden {
      display: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 15px;
    }

    .stat-box {
      background: linear-gradient(to bottom right, #ffffff, #f3f4f6);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="header" id="header">
  <div id="branding">🏠 PropAI</div>
  <button onclick="showLogin()">Sales Login</button>
</div>

<div class="container">

  <div id="customerView">

    <div class="card">

      <h2>AI Property Assistant</h2>

      <input id="name" placeholder="Your Name *">

      <input id="phone" placeholder="Phone Number *" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

      <select id="location">
        <option value="">Select Location</option>
        <option>Thane</option>
        <option>Navi Mumbai</option>
        <option>Panvel</option>
      </select>

      <select id="budget">
        <option value="">Select Budget</option>
        <option>50-80 lakh</option>
        <option>80 lakh - 1 Cr</option>
        <option>1 Cr+</option>
      </select>

      <select id="timeline">
        <option value="">Purchase Timeline</option>
        <option>Immediate</option>
        <option>1 Month</option>
        <option>1-3 Months</option>
      </select>

      <textarea id="leadText" placeholder="Tell us your requirement"></textarea>

      <button id="submitBtn" onclick="sendLead()">
        Submit Lead
      </button>

      <button onclick="startVoice()">
        🎙️ Voice Inquiry
      </button>

      <button onclick="chatbotFill()">
        🤖 AI Chatbot Demo
      </button>

      <div id="result"></div>

    </div>

  </div>

  <div id="loginView" class="hidden">

    <div class="card">

      <h2>Builder Login</h2>

      <input id="username" placeholder="Username">

      <input id="password" type="password" placeholder="Password">

      <button onclick="login()">Login</button>

    </div>

  </div>

  <div id="dashboardView" class="hidden">

    <div class="stats">

      <div class="stat-box">
        Total<br>
        <span id="total">0</span>
      </div>

      <div class="stat-box">
        🔥 HOT<br>
        <span id="hot">0</span>
      </div>

      <div class="stat-box">
        🟡 WARM<br>
        <span id="warm">0</span>
      </div>

      <div class="stat-box">
        ❄️ COLD<br>
        <span id="cold">0</span>
      </div>

    </div>

    <div class="card">
      <canvas id="analyticsChart"></canvas>
    </div>

    <div class="card">
      <h3>Lead History</h3>
      <div id="history"></div>
    </div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const builder = params.get("builder") || "builder1";

let chart;

function showLogin() {

  document.getElementById("customerView")
    .classList.add("hidden");

  document.getElementById("loginView")
    .classList.remove("hidden");
}

async function login() {

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  const res = await fetch("/login", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      username,
      password
    })
  });

  const data = await res.json();

  console.log(data);

  if (!data.success) {
    alert("Invalid Login");
    return;
  }

  document.getElementById("branding").innerHTML =
    `${data.logo} ${data.company}`;

  document.getElementById("header").style.background =
    data.themeColor;

  document.getElementById("loginView")
    .classList.add("hidden");

  document.getElementById("dashboardView")
    .classList.remove("hidden");

  loadHistory();
  loadAnalytics();
}


async function sendLead() {

  const submitBtn = document.getElementById("submitBtn");

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const location = document.getElementById("location").value;
  const budget = document.getElementById("budget").value;
  const timeline = document.getElementById("timeline").value;

  if (!name || !phone || !location || !budget || !timeline) {
    document.getElementById("result").innerHTML =
      "❌ Please fill all mandatory fields";
    return;
  }

  if (phone.length !== 10) {
    document.getElementById("result").innerHTML =
      "❌ Phone number must be 10 digits";
    return;
  }

  submitBtn.innerHTML = "Submitting...";
  submitBtn.disabled = true;

  const payload = {

    builder,

    name,

    phone,

    location,

    budget,

    timeline,

    text: document.getElementById("leadText").value,

    source: "Website"
  };

  try {

    await fetch("/qualify", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify(payload)
    });

    document.getElementById("result").innerHTML =
      "✅ Lead Submitted Successfully";

    // CLEAR FORM
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("location").value = "";
    document.getElementById("budget").value = "";
    document.getElementById("timeline").value = "";
    document.getElementById("leadText").value = "";

  } catch (err) {

    document.getElementById("result").innerHTML =
      "❌ Error submitting lead";
  }

  submitBtn.innerHTML = "Submit Lead";
  submitBtn.disabled = false;
}


async function loadHistory() {

  const res = await fetch("/leads");

  const leads = await res.json();

  let html = "";

  leads.forEach((lead) => {

    html += `
      <div style="border-bottom:1px solid #ddd;padding:10px">

        <b>${lead.name}</b><br>

        📞 ${lead.phone}<br>

        📍 ${lead.location}<br>

        💰 ${lead.budget}<br>

        🧠 ${lead.status} (${lead.score}/100)<br>

        ⏰ ${lead.timeline}<br>

      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

async function loadAnalytics() {

  const res = await fetch("/analytics");

  const data = await res.json();

  document.getElementById("total").innerHTML = data.total;
  document.getElementById("hot").innerHTML = data.hot;
  document.getElementById("warm").innerHTML = data.warm;
  document.getElementById("cold").innerHTML = data.cold;

  const ctx = document.getElementById("analyticsChart");

  chart = new Chart(ctx, {

    type: 'bar',

    data: {
      labels: ['HOT', 'WARM', 'COLD'],
      datasets: [{
        label: 'Lead Analytics',
        data: [data.hot, data.warm, data.cold]
      }]
    }
  });
}

// =========================
// AI CHATBOT DEMO
// =========================
function chatbotFill() {

  document.getElementById("leadText").value =
    "Need 3BHK near station under 1.2Cr ready to buy urgently";

  document.getElementById("budget").value = "1 Cr+";

  document.getElementById("timeline").value = "Immediate";

  document.getElementById("result").innerHTML =
    "🤖 AI chatbot generated smart requirement";
}


// =========================
// VOICE INQUIRY
// =========================
function startVoice() {

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice recognition not supported in this browser");
    return;
  }

  const recognition = new SpeechRecognition();

  recognition.lang = "en-US";

  recognition.start();

  document.getElementById("result").innerHTML =
    "🎙️ Listening... Please speak";

  recognition.onresult = function(event) {

    const transcript =
      event.results[0][0].transcript;

    document.getElementById("leadText").value = transcript;

    document.getElementById("result").innerHTML =
      "✅ Voice captured successfully";
  };

  recognition.onerror = function(event) {

    document.getElementById("result").innerHTML =
      "❌ Voice Error: " + event.error;
  };
}

</script>

</body>
</html>
