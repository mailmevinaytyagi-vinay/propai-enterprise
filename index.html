<!DOCTYPE html>
<html>
<head>
  <title>PropAI Enterprise</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to right, #eef2ff, #f8fafc);
      color: #111827;
    }

    .header {
      background: #1e3a8a;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      background: #2563eb;
      font-weight: bold;
      font-size: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .matches {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .match-card {
      border: 1px solid #dbe3f0;
      border-radius: 10px;
      padding: 14px;
      background: #f8fafc;
    }

    .match-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: bold;
    }

    .match-score {
      color: #047857;
      white-space: nowrap;
    }

    .match-meta {
      margin-top: 8px;
      color: #374151;
      line-height: 1.5;
    }

    .match-reasons {
      margin-top: 8px;
      color: #1f2937;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="header" id="header">
  <div id="branding">🏠 PropAI</div>
</div>

<div class="container">

  <div class="card">

    <h2>AI Property Assistant</h2>

    <input id="name" placeholder="Your Name *">

    <input id="phone" placeholder="Phone Number *" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <select id="location">
      <option value="">Select Location</option>
      <option>Thane</option>
      <option>Navi Mumbai</option>
      <option>Panvel</option>
    </select>

    <select id="budget">
      <option value="">Select Budget</option>
      <option>50-80 lakh</option>
      <option>80 lakh - 1 Cr</option>
      <option>1 Cr+</option>
    </select>

    <select id="timeline">
      <option value="">Purchase Timeline</option>
      <option>Immediate</option>
      <option>1 Month</option>
      <option>1-3 Months</option>
    </select>

    <textarea id="leadText" placeholder="Tell us your requirement"></textarea>

    <button id="submitBtn" onclick="sendLead()">
      Submit Lead
    </button>

    <button onclick="startVoice()">
      🎙️ Voice Inquiry
    </button>

    <button onclick="chatbotFill()">
      🤖 AI Chatbot Demo
    </button>

    <div id="result"></div>
    <div id="matches"></div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const builder = params.get("builder") || "builder1";

async function sendLead() {

  const submitBtn = document.getElementById("submitBtn");

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const location = document.getElementById("location").value;
  const budget = document.getElementById("budget").value;
  const timeline = document.getElementById("timeline").value;

  if (!name || !phone || !location || !budget || !timeline) {
    document.getElementById("result").innerHTML =
      "❌ Please fill all mandatory fields";
    return;
  }

  if (phone.length !== 10) {
    document.getElementById("result").innerHTML =
      "❌ Phone number must be 10 digits";
    return;
  }

  submitBtn.innerHTML = "Submitting...";
  submitBtn.disabled = true;

  const payload = {

    builder,

    name,

    phone,

    location,

    budget,

    timeline,

    text: document.getElementById("leadText").value,

    source: "Website"
  };

  try {

    const res = await fetch("/qualify", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify(payload)
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
      "✅ Lead Submitted Successfully";

    renderMatches(data.matches || []);

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("location").value = "";
    document.getElementById("budget").value = "";
    document.getElementById("timeline").value = "";
    document.getElementById("leadText").value = "";

  } catch (err) {

    document.getElementById("result").innerHTML =
      "❌ Error submitting lead";
  }

  submitBtn.innerHTML = "Submit Lead";
  submitBtn.disabled = false;
}

function escapeHtml(value) {

  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderMatches(matches) {

  const container = document.getElementById("matches");

  if (!matches.length) {
    container.innerHTML = `
      <div class="matches">
        <div class="match-card">
          No exact property matches found. Our sales team will follow up with alternatives.
        </div>
      </div>
    `;
    return;
  }

  let html = `
    <div class="matches">
      <h3>Recommended Properties</h3>
  `;

  matches.forEach((match) => {

    html += `
      <div class="match-card">
        <div class="match-title">
          <span>${escapeHtml(match.title)}</span>
          <span class="match-score">${escapeHtml(match.matchScore)}% match</span>
        </div>
        <div class="match-meta">
          ${escapeHtml(match.bhk)}BHK · ${escapeHtml(match.location)} · ${escapeHtml(match.budgetLabel)} · ${escapeHtml(match.possession)}
        </div>
        <div class="match-meta">
          ${escapeHtml(match.description)}
        </div>
        <div class="match-reasons">
          ${match.reasons.map(escapeHtml).join(" · ")}
        </div>
      </div>
    `;
  });

  html += "</div>";

  container.innerHTML = html;
}


// =========================
// AI CHATBOT DEMO
// =========================
function chatbotFill() {

  document.getElementById("leadText").value =
    "Need 3BHK near station under 1.2Cr ready to buy urgently";

  document.getElementById("budget").value = "1 Cr+";

  document.getElementById("timeline").value = "Immediate";

  document.getElementById("result").innerHTML =
    "🤖 AI chatbot generated smart requirement";
}


// =========================
// VOICE INQUIRY
// =========================
function startVoice() {

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice recognition not supported in this browser");
    return;
  }

  const recognition = new SpeechRecognition();

  recognition.lang = "en-US";

  recognition.start();

  document.getElementById("result").innerHTML =
    "🎙️ Listening... Please speak";

  recognition.onresult = function(event) {

    const transcript =
      event.results[0][0].transcript;

    document.getElementById("leadText").value = transcript;

    document.getElementById("result").innerHTML =
      "✅ Voice captured successfully";
  };

  recognition.onerror = function(event) {

    document.getElementById("result").innerHTML =
      "❌ Voice Error: " + event.error;
  };
}

</script>

</body>
</html>
